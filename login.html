<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inicio de sesion</title>
</head>
<body>

    <h1>Iniciar sesión</h1>

    <form >

        <input
            type="text"
            id="username"
            placeholder="Usuario"
            required
        >
            <br>
            <br>
        <input
            type="password"
            id="password"
            placeholder="Contraseña"
            required
        >
            <br>
            <br>
        <button type="submit">
            Ingresar
        </button>

    </form>

    

    <script src="js/login.js"></script>

</body>
</html>
